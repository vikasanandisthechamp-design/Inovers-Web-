name: Flutter CI / CD

# ──────────────────────────────────────────────────────────────────────────────
# CI  (every PR + push to main) : analyze · test
# CD  (push to main only)       : sign + build AAB → Play Console internal
#                                  sign + build IPA → TestFlight
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#
#  ANDROID
#    ANDROID_KEYSTORE_BASE64        base64 < your-release.jks
#    ANDROID_KEY_ALIAS              alias used when creating the keystore
#    ANDROID_KEY_PASSWORD           key password
#    ANDROID_STORE_PASSWORD         keystore password
#    GOOGLE_PLAY_SERVICE_ACCOUNT_JSON   JSON from Play Console → Setup → API access
#
#  iOS
#    IOS_CERT_BASE64                base64 < Certificates.p12  (Apple Distribution cert)
#    IOS_CERT_PASSWORD              password you set when exporting the .p12
#    IOS_PROVISION_BASE64           base64 < SportGod_AppStore.mobileprovision
#    APP_STORE_CONNECT_API_KEY_ID      from App Store Connect → Users → Keys
#    APP_STORE_CONNECT_API_ISSUER_ID   same page — Issuer ID
#    APP_STORE_CONNECT_API_PRIVATE_KEY  full content of the downloaded .p8 file
# ──────────────────────────────────────────────────────────────────────────────

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  FLUTTER_VERSION: '3.29.3'
  API_BASE_URL: 'https://sportgod-backend-production.up.railway.app'

jobs:
  # ── 1. Analyze + Test (every PR and push) ───────────────────────────────────
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze (no fatal infos)
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

  # ── 2. Android build + sign + upload (push to main only) ────────────────────
  deploy-android:
    name: Android → Play Console (internal)
    needs: analyze-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.ANDROID_KEYSTORE_BASE64 != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.jks

      - name: Build Android App Bundle (signed)
        run: |
          flutter build appbundle --release \
            --dart-define=API_BASE_URL=${{ env.API_BASE_URL }}
        env:
          ANDROID_KEY_ALIAS:      ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD:   ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: sportgod-release-aab
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Set up Ruby + Fastlane
        uses: ruby/setup-ruby@v1
        with:
          working-directory: android
          bundler-cache: true

      - name: Deploy to Play Console internal track
        if: secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON != ''
        working-directory: android
        run: bundle exec fastlane beta
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}

  # ── 3. iOS build + sign + upload (push to main only) ────────────────────────
  deploy-ios:
    name: iOS → TestFlight
    needs: analyze-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.IOS_CERT_BASE64 != ''
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      # ── Code signing setup ──────────────────────────────────────────────────
      - name: Import Distribution Certificate
        run: |
          echo "${{ secrets.IOS_CERT_BASE64 }}" | base64 --decode > /tmp/cert.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 16)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import /tmp/cert.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "${{ secrets.IOS_CERT_PASSWORD }}" \
            -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Install Provisioning Profile
        run: |
          echo "${{ secrets.IOS_PROVISION_BASE64 }}" | base64 --decode > /tmp/profile.mobileprovision
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          UUID=$(grep -a -A 1 'UUID' /tmp/profile.mobileprovision | grep string | sed 's/<string>//;s/<\/string>//' | tr -d '[:space:]')
          cp /tmp/profile.mobileprovision "$PROFILES_DIR/$UUID.mobileprovision"

      # ── Write App Store Connect API key for Fastlane ────────────────────────
      - name: Write ASC API Key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          cat << 'APIKEYEOF' > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8
          ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
          APIKEYEOF

      # ── Flutter build ────────────────────────────────────────────────────────
      - name: Build iOS (release)
        run: |
          flutter build ios --release \
            --dart-define=API_BASE_URL=${{ env.API_BASE_URL }}

      # ── Archive + IPA via Fastlane ───────────────────────────────────────────
      - name: Set up Ruby + Fastlane
        uses: ruby/setup-ruby@v1
        with:
          working-directory: ios
          bundler-cache: true

      - name: Upload to TestFlight
        if: secrets.APP_STORE_CONNECT_API_KEY_ID != ''
        working-directory: ios
        run: bundle exec fastlane beta
        env:
          APP_STORE_CONNECT_API_KEY_ID:      ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID:   ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY }}
