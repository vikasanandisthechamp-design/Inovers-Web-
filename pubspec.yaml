name: sportgod
description: SportGod AI — Super Scoreboard

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP + WebSocket
  http: ^1.2.1
  web_socket_channel: ^3.0.0

  # Auth + Realtime
  supabase_flutter: ^2.0.0

  # State management
  provider: ^6.1.2

  # Navigation
  go_router: ^13.2.1

  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fl_chart: ^0.67.0
  flutter_animate: ^4.5.0
  flutter_markdown: ^0.7.0

  # Push notifications + crash reporting
  # SETUP REQUIRED: Run `flutterfire configure` after creating Firebase project.
  # Download google-services.json (Android) and GoogleService-Info.plist (iOS).
  # All three must stay on the same Firebase SDK major version (v3 family).
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  firebase_crashlytics: ^4.1.3

  # Payments
  # SETUP REQUIRED: Set RAZORPAY_KEY_ID in environment or app config.
  razorpay_flutter: ^1.3.7

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  equatable: ^2.0.5
  flutter_secure_storage: ^9.0.0
  url_launcher: ^6.2.5
  share_plus: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
